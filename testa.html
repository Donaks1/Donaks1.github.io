<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyframe Animation</title>
  <style>
    @keyframes fadeInOut {
      0% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .box {
      width: 100px;
      height: 100px;
      background-color: blue;
      animation: fadeInOut 3s infinite alternate ease-in-out;
    }
  </style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
